        const useTilt = (active = true) => {
          const ref = useRef(null);
          const [transform, setTransform] = useState('perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)');
          const [shadow, setShadow] = useState('0px 10px 30px -5px rgba(0, 0, 0, 0.3)');

          const handleMouseMove = (e) => {
            if (!ref.current || !active) return;
            const { left, top, width, height } = ref.current.getBoundingClientRect();
            const x = (e.clientX - left) / width;
            const y = (e.clientY - top) / height;
            const tiltX = (0.5 - y) * 15;
            const tiltY = (x - 0.5) * 15;

            setTransform(`perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`);
            setShadow(`${-tiltY}px ${tiltX + 10}px 30px -5px rgba(0, 0, 0, 0.5)`);
          };

          const handleMouseLeave = () => {
            setTransform('perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)');
            setShadow('0px 10px 30px -5px rgba(0, 0, 0, 0.3)');
          };

          return { ref, transform, shadow, handleMouseMove, handleMouseLeave };
        };

        const useMagnetic = (strength = 30) => {
          const ref = useRef(null);
          const [position, setPosition] = useState({ x: 0, y: 0 });

          const handleMouseMove = (e) => {
            if (!ref.current) return;
            const { left, top, width, height } = ref.current.getBoundingClientRect();
            const centerX = left + width / 2;
            const centerY = top + height / 2;
            const deltaX = e.clientX - centerX;
            const deltaY = e.clientY - centerY;
            setPosition({ x: deltaX / strength, y: deltaY / strength });
          };

          const handleMouseLeave = () => {
            setPosition({ x: 0, y: 0 });
          };

          return { ref, position, handleMouseMove, handleMouseLeave };
        };

                    <div className="mb-8">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="p-2 bg-blue-100 text-blue-700 rounded-lg">
                          <Ticket size={20} />
                        </div>
                        <span className="text-sm font-bold text-blue-600 uppercase tracking-widest">Official Booking</span>
                      </div>
                      <h2 className="text-3xl md:text-4xl font-extrabold text-blue-900 tracking-tight">Keynote Inquiry</h2>
                      <p className="text-slate-500 mt-2 text-lg">Available for conferences, corporate summits, and private workshops.</p>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-8">
                      {/* Audience Slider */}
                      <div className="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <div className="flex justify-between items-end">
                          <label className="text-sm font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                            <Users size={16} /> Audience Size
                          </label>
                          <span className="text-2xl font-bold text-blue-600 tabular-nums">
                            {audience === 5000 ? '5,000+' : audience.toLocaleString()}
                            <span className="text-sm font-medium text-slate-400 ml-1">people</span>
                          </span>
                        </div>
                        <input 
                          type="range" 
                          min="5" 
                          max="5000" 
                          step="5"
                          value={audience} 
                          onChange={(e) => setAudience(Number(e.target.value))}
                          className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600 hover:accent-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                        />
                        <div className="flex justify-between text-xs font-semibold text-slate-400 px-1">
                          <span>5</span>
                          <span>1K</span>
                          <span>2.5K</span>
                          <span>5K+</span>
                        </div>
                      </div>

                      {/* Contact Fields */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700 ml-1">Email Address</label>
                          <div className="relative">
                            <Mail className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                            <input 
                              required 
                              type="email" 
                              placeholder="client@company.com" 
                              className="w-full bg-white border-2 border-slate-200 rounded-xl py-3 pl-12 pr-4 text-slate-800 placeholder-slate-300 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium" 
                            />
                          </div>
                        </div>
                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700 ml-1">Phone Number</label>
                          <div className="relative">
                            <Phone className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                            <input 
                              required 
                              type="tel" 
                              placeholder="+1 (555) 000-0000" 
                              className="w-full bg-white border-2 border-slate-200 rounded-xl py-3 pl-12 pr-4 text-slate-800 placeholder-slate-300 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium" 
                            />
                          </div>
                        </div>
                      </div>

                      {/* Submit Action */}
                      <div className="pt-4 flex items-center justify-between border-t border-slate-100">
                        <div className="flex items-center gap-2 text-xs font-medium text-slate-400">
                          <Building2 size={14} />
                          <span>Representation: United Talent Agency</span>
                        </div>
                        <button 
                          type="submit" 
                          disabled={isSubmitting}
                          className="px-8 py-4 bg-gradient-to-r from-blue-700 to-blue-600 text-white font-bold rounded-xl hover:shadow-lg hover:shadow-blue-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                        >
                          {isSubmitting ? 'Sending Request...' : 'Request Availability'}
                          {!isSubmitting && <ArrowRight size={18} />}
                        </button>
                      </div>
                    </form>
                  </div>
                )}
              </div>
            </div>
          );
        };

        // The Expanded Modal (New Design: White Modal, but adaptable to old content)
        const ExpandedCard = ({ item, onClose }) => {
          if (!item) return null;
          const isPolaroid = item.type === 'image';

          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 animate-fade-in-fast">
              <div className="absolute inset-0 bg-blue-950/80 backdrop-blur-xl" onClick={onClose} />
              
              {/* CASE 1: POLAROID STYLE (Images) */}
              {isPolaroid ? (
                <div className="relative animate-wiggle-float origin-center">
                    <button 
                      onClick={onClose}
                      className="absolute -top-12 right-0 z-50 p-3 bg-white hover:bg-gray-100 rounded-full text-blue-900 shadow-lg transition-colors"
                    >
                      <X size={24} />
                    </button>
                    <div className="bg-white p-4 pb-16 shadow-2xl transform rotate-1 max-w-xl w-full border-[8px] border-white rounded-lg">
                        <div className="aspect-[4/3] w-full bg-gray-100 overflow-hidden mb-6 rounded-sm border border-gray-100">
                            <img src={item.image} alt={item.title} className="w-full h-full object-cover" />
                        </div>
                        <div className="text-center transform -rotate-1 px-4">
                            <p className="font-handwriting text-3xl text-blue-900 leading-relaxed tracking-wide">
                                {item.markerNote || item.description}
                            </p>
                        </div>
                    </div>
                </div>
              ) : (
              /* CASE 2: STANDARD CONTENT MODAL (New Design: White BG) */
              <div className="relative w-full max-w-5xl max-h-[90vh] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row animate-scale-up border-[6px] border-white">
                <button 
                  onClick={onClose}
                  className="absolute top-4 right-4 z-50 p-2 bg-black/10 hover:bg-black/20 rounded-full text-black backdrop-blur-md transition-colors"
                >
                  <X size={24} />
                </button>

                {/* Media Section */}
                <div className={`relative ${item.type === 'project' ? 'md:w-1/2' : 'md:w-5/12'} bg-slate-100 h-64 md:h-auto overflow-hidden`}>
                   {item.type === 'video' ? (
                     <div className="w-full h-full flex items-center justify-center relative group cursor-pointer bg-black">
                        {item.video ? (
                            <video src={item.video} autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover opacity-80" />
                        ) : (
                            <img src={item.image} className="absolute inset-0 w-full h-full object-cover opacity-80" />
                        )}
                        <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl group-hover:scale-110 transition-transform z-10">
                          <Play className="fill-blue-600 text-blue-600 ml-1 w-8 h-8" />
                        </div>
                     </div>
                   ) : (
                     <img 
                        src={item.image || item.secondaryImage} 
                        alt={item.title} 
                        className="w-full h-full object-cover" 
                        onError={(e) => {
                            // Fallback if local image missing in modal
                            if (item.image && item.image.includes('thumbnail6.jpg')) {
                                e.target.src = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1974&auto=format&fit=crop";
                            } else if (item.image && item.image.includes('pjp.jpg')) {
                                e.target.src = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=2080&auto=format&fit=crop";
                            }
                        }}
                    />
                   )}
                   {/* Tag Overlay */}
                   <div className="absolute top-6 left-6">
                      <span className="flex items-center gap-2 px-4 py-1.5 bg-white rounded-full text-xs font-bold text-blue-900 uppercase tracking-wider shadow-lg">
                        {item.icon} {item.tag}
                      </span>
                   </div>
                </div>

                {/* Content Section - Dark text for white background */}
                <div className={`flex-1 p-8 md:p-12 flex flex-col overflow-y-auto ${item.type === 'project' ? 'md:w-1/2' : 'md:w-7/12'} scrollbar-hide`}>
                  <div className="mb-8">
                    <h2 className="text-4xl md:text-5xl font-extrabold text-blue-900 mb-3 leading-tight tracking-tight">{item.title}</h2>
                    <p className="text-xl text-blue-600 font-semibold">{item.subtitle}</p>
                  </div>
                  
                  <div className="prose prose-lg text-slate-600 leading-relaxed mb-8">
                      {item.content || <p>{item.description}</p>}
                  </div>

                  <div className="mt-auto pt-8 border-t border-gray-100 flex justify-between items-center">
                      <div className="flex gap-4 text-sm font-semibold text-gray-400">
                        <span>Feb 2026</span>
                        <span>•</span>
                        <span>5 min read</span>
                      </div>
                      {/* Only show View Full if it is an external link */}
                      {item.externalLink && (
                        <a href={item.externalLink} target="_blank" rel="noopener noreferrer" className="px-6 py-3 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-lg">
                          View Source <ExternalLink size={16} />
                        </a>
                      )}
                  </div>
                </div>
              </div>
              )}
            </div>
          );
        };

        // Content Card Component (New Design Style)
        const ContentCard = ({ item, onClick }) => {
          return (
            <TiltCard 
              onClick={() => onClick(item)} 
              className={`${item.colSpan} cursor-pointer group min-h-[320px] flex flex-col`}
            >
              {/* Background Image / Gradient / Video */}
              {(item.image || item.video) && (
                <div className="absolute inset-0 z-0">
                  {item.video ? (
                    <video 
                        src={item.video} 
                        autoPlay 
                        loop 
                        muted 
                        playsInline
                        className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                    />
                  ) : (
                    <img 
                      src={item.image} 
                      alt={item.title} 
                      className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                      onError={(e) => {
                          // Fallback if local image missing in card
                          if (item.image.includes('thumbnail6.jpg')) {
                              e.target.src = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1974&auto=format&fit=crop";
                          }
                      }}
                    />
                  )}
                  {/* Stronger overlay for legibility */}
                  <div className="absolute inset-0 bg-gradient-to-t from-blue-900/90 via-blue-900/40 to-transparent opacity-80" />
                </div>
              )}
              
              {/* Fallback for text-only blog posts - now a nice gradient */}
              {!(item.image || item.video) && (
                <div className="absolute inset-0 bg-gradient-to-br from-white/20 to-white/5" />
              )}

              {/* Top Tag */}
              <div className="absolute top-5 left-5 z-20">
                <div className={`
                  flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/30 text-xs font-bold uppercase tracking-wider shadow-lg backdrop-blur-md
                  ${item.isLive ? 'bg-red-500 text-white animate-pulse border-red-400' : 'bg-white/20 text-white'}
                `}>
                  {item.isLive && <span className="w-1.5 h-1.5 bg-white rounded-full animate-ping" />}
                  {item.icon}
                  {item.tag}
                </div>
              </div>

              {/* Content */}
              <div className="relative z-10 p-7 mt-auto">
                <h3 className={`font-bold text-white mb-2 leading-[1.1] drop-shadow-md ${item.colSpan.includes('col-span-2') ? 'text-4xl' : 'text-2xl'}`}>
                  {item.title}
                </h3>
                <p className="text-sm text-blue-100/90 line-clamp-2 mb-4 group-hover:text-white transition-colors font-medium">
                  {item.description}
                </p>
                
                <div className="flex items-center gap-2 text-xs font-black text-white uppercase tracking-widest opacity-0 transform translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
                  Read Story <ChevronRight size={14} className="bg-white text-blue-600 rounded-full p-0.5" />
                </div>
              </div>
            </TiltCard>
          );
        };

        // MAIN APP
        const App = () => {
          const [selectedItem, setSelectedItem] = useState(null);
          const [isBookingOpen, setIsBookingOpen] = useState(false);

          useEffect(() => {
            if (selectedItem || isBookingOpen) {
              document.body.style.overflow = 'hidden';
            } else {
              document.body.style.overflow = 'unset';
            }
          }, [selectedItem, isBookingOpen]);

          return (
            <div className="relative min-h-screen text-slate-200 font-sans selection:bg-white selection:text-blue-600 pb-20">
              <style>{`
                /* Font imports handled in HTML Head for better performance, but retained logic here just in case */
                body { font-family: 'Plus Jakarta Sans', sans-serif; }
                .font-handwriting { font-family: 'Permanent Marker', cursive; }
                
                .animate-float { animation: float 10s ease-in-out infinite; }
                @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                
                .animate-fade-in-fast { animation: fadeIn 0.3s ease-out forwards; }
                .animate-scale-up { animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                
                .animate-wiggle-float { animation: wiggleFloat 6s ease-in-out infinite; }
                
                @keyframes wiggleFloat {
                    0%, 100% { transform: rotate(1deg) translateY(0); }
                    25% { transform: rotate(-1deg) translateY(-10px); }
                    50% { transform: rotate(2deg) translateY(0); }
                    75% { transform: rotate(-2deg) translateY(-5px); }
                }
                
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes scaleUp { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

                /* Masonry Grid Hacks */
                .masonry-grid {
                  display: grid;
                  grid-template-columns: repeat(1, 1fr);
                  gap: 2rem;
                }
                @media (min-width: 768px) {
                  .masonry-grid { grid-template-columns: repeat(2, 1fr); }
                }
                @media (min-width: 1024px) {
                  .masonry-grid { grid-template-columns: repeat(3, 1fr); }
                }
              `}</style>

              <Background />
              
              {/* Pass the new open event down to the header component */}
              <Header 
                onBookKeynote={() => setIsBookingOpen(true)} 
                onOpenBio={() => setSelectedItem(BIO_ITEM)} 
              />

              <main className="max-w-7xl mx-auto px-6 md:px-10 pb-24">
                
                {/* --- SEO / AI CRAWLER HIDDEN TEXT --- */}
                {/* This text is invisible to screen users but immediately indexable by bots parsing the DOM. */}
                <div className="sr-only">
                  Morten Haulik is an award-winning XR developer, product owner, and keynote speaker based in Copenhagen. Over a decade ago, at age 22, Morten left his Information Science studies at the University of Copenhagen to join Khora Virtual Reality—the first Nordic XR studio—full-time. Since then, he has facilitated over 100 XR workshops, shipped multiple high-impact spatial computing products, and delivered keynote speeches to audiences of up to 2,000+ people.
                  Over the past five years, Morten has crafted immersive WebXR and VR/AR experiences for some of the world's leading global brands and cultural institutions. His award-winning work is used daily across the globe, transforming workflows in hospitals, enhancing museum exhibits, and entertaining VR users at home.
                  Since 2022, Morten has served as an Entrepreneur in Residence at the University of Copenhagen, helping shape the innovative KU Lighthouse initiative to support students and faculty in launching new tech startups.
                  In 2025, during a year abroad in Milan, Italy, Morten launched NXT/WebXR. It has rapidly grown into one of the world's largest XR platforms, serving as the definitive gateway for daily users worldwide to explore the spatial internet.
                </div>

                <div className="masonry-grid">
                  {PORTFOLIO_ITEMS.map((item, index) => (
                    <div key={item.id} className={`${item.colSpan} animate-fade-in-fast`} style={{ animationDelay: `${index * 0.1}s` }}>
                      <ContentCard item={item} onClick={setSelectedItem} />
                    </div>
                  ))}
                  
                  <div className="md:col-span-1 lg:col-span-1 animate-fade-in-fast" style={{ animationDelay: '0.8s' }}>
                      <ContactCard />
                  </div>
                </div>
              </main>

              <footer className="w-full text-center py-10 text-white/50 text-sm font-semibold tracking-wide">
                <div className="flex items-center justify-center gap-4 mb-4 opacity-70 hover:opacity-100 transition-opacity">
                      <Globe size={16} />
                      <span>Designed in Copenhagen</span>
                </div>
                <p>© 2026 Morten Haulik. All rights reserved.</p>
              </footer>

              {/* The Overlay Modals */}
              {selectedItem && (
                <ExpandedCard item={selectedItem} onClose={() => setSelectedItem(null)} />
              )}
              
              {isBookingOpen && (
                <KeynoteModal onClose={() => setIsBookingOpen(false)} />
              )}
            </div>
          );
        };

        // --- MOUNT THE APP ---
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
